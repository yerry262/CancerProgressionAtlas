<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CancerProgressionAtlas – Open Source Cancer Imaging Database</title>
    <meta name="description" content="A crowdsourced, open-source cancer imaging database built by patients. Upload your CT, MRI, PET scans to help train AI models that detect cancer earlier." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- GitHub Pages SPA redirect handler -->
    <script>
      (function() {
        var p = window.location.search.slice(1).split('&')
          .find(function(s) { return s.startsWith('p='); });
        if (p) {
          var path = '/' + decodeURIComponent(p.slice(2));
          var h = window.location.search.slice(1).split('&')
            .find(function(s) { return s.startsWith('h='); });
          window.history.replaceState(
            null, null,
            path + (h ? '#' + decodeURIComponent(h.slice(2)) : '')
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

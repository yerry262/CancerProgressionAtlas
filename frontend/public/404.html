<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>CancerProgressionAtlas</title>
    <script>
      // GitHub Pages SPA redirect — preserves the full path so React Router
      // can handle it client-side after the app loads.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + encodeURIComponent(l.pathname.slice(1) + l.search) +
        (l.hash ? '&h=' + encodeURIComponent(l.hash.slice(1)) : '')
      );
    </script>
  </head>
  <body></body>
</html>

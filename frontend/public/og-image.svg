<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#050a14"/>
  <!-- Grid lines subtle -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#0a1628" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#0a1628" stroke-width="1"/>
  <!-- Glow blobs -->
  <ellipse cx="200" cy="315" rx="300" ry="200" fill="#0066ff" opacity="0.06"/>
  <ellipse cx="1000" cy="315" rx="300" ry="200" fill="#00d4ff" opacity="0.06"/>
  <!-- Logo icon -->
  <rect x="530" y="155" width="60" height="220" rx="24" fill="url(#ig1)"/>
  <rect x="440" y="245" width="240" height="60" rx="24" fill="url(#ig1)"/>
  <!-- Title -->
  <text x="600" y="445" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#c8dff0" text-anchor="middle">CancerProgressionAtlas</text>
  <text x="600" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#6a8fa8" text-anchor="middle">Open-source crowdsourced cancer imaging database</text>
  <defs>
    <linearGradient id="ig1" x1="440" y1="155" x2="680" y2="375" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0066ff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
  </defs>
</svg>

[build]
builder = "nixpacks"

[[services]]
name = "api"
source = "backend"
buildCommand = "npm install && npm run build"
startCommand = "npm start"

[services.variables]
PORT = "4000"
NODE_ENV = "production"

[[services]]
name = "frontend"
source = "frontend"
buildCommand = "npm install && npm run build"
startCommand = "npx serve -s dist -l 3000"
